name: Backend Unit Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "3-backend-app/**"
      - "3-backend-app/.github/workflows/unit-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "3-backend-app/**"
      - "3-backend-app/.github/workflows/unit-tests.yml"

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 3-backend-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: 3-backend-app/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run unit tests
        run: pytest tests/unit -v
