# Backend unit tests — runs when app code or this workflow changes.
# Repo root = backend app (app/, tests/, requirements.txt). No working-directory needed.

name: Backend Unit Tests

on:
  push:
    branches: [main, develop, feature/webapp-backend]
    paths:
      - "tests/**"

  pull_request:
    branches: [main, develop, feature/webapp-backend]
    paths:
      - "tests/**"

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run unit tests
        run: pytest tests/unit -v
